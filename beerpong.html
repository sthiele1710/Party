<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beerpong</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Der Body bekommt jetzt das Bild als Hintergrund */
        body { 
            font-family: system-ui, sans-serif; 
            color: white; 
            text-align: center; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            
            /* Hier wird das Bild geladen und mit einem leichten dunklen Filter überlegt */
            background: linear-gradient(rgba(18, 18, 18, 0.6), rgba(18, 18, 18, 0.85)), url('beerpong_icon.png');
            background-size: cover;      /* Zieht das Bild über den ganzen Bildschirm */
            background-position: center; /* Zentriert das Bild */
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        h1 { 
            color: #ff9800; 
            margin-top: 30px; 
            font-size: 30px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.8); /* Schatten für bessere Lesbarkeit */
        }
        
        .vs-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 20px; 
            gap: 20px; 
        }
        
        .win-btn { 
            padding: 30px; 
            font-size: 24px; 
            font-weight: bold; 
            border-radius: 15px; 
            border: none; 
            cursor: pointer; 
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        .win-btn:active { transform: scale(0.95); }
        
        #btn-p1 { background: linear-gradient(135deg, #ff4081, #c51162); color: white; }
        #btn-p2 { background: linear-gradient(135deg, #00bfff, #0091ea); color: white; }
        
        .vs-text { 
            font-size: 24px; 
            color: #ccc; 
            font-weight: bold; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
        
        #homeBtn { 
            padding: 15px; 
            margin-bottom: 20px; 
            background: rgba(42, 42, 42, 0.9); /* Leicht transparent */
            color: white; 
            border: 1px solid #555; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            width: 80%; 
            max-width: 400px; 
            align-self: center;
        }
    </style>
</head>
<body>

    <h1>🍺 Wer hat gewonnen?</h1>

    <div class="vs-container">
        <button id="btn-p1" class="win-btn" onclick="declareWinner(1)"></button>
        <div class="vs-text">VS</div>
        <button id="btn-p2" class="win-btn" onclick="declareWinner(2)"></button>
    </div>

    <button id="homeBtn" onclick="location.href='index.html'">🏠 Zurück zum Hub</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isTournament = urlParams.get('tournament') === 'true';

        let name1 = isTournament ? localStorage.getItem('tournament_p1') : localStorage.getItem('party_p1');
        let name2 = isTournament ? localStorage.getItem('tournament_p2') : localStorage.getItem('party_p2');

        name1 = name1 || "Team 1";
        name2 = name2 || "Team 2";

        document.getElementById('btn-p1').innerText = `🏆 ${name1} siegt!`;
        document.getElementById('btn-p2').innerText = `🏆 ${name2} siegt!`;

        if (isTournament) {
            document.getElementById('homeBtn').style.display = 'none';
        }

        function declareWinner(playerNum) {
            const winnerName = playerNum === 1 ? name1 : name2;
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            
            // Statistik speichern
            let stats = JSON.parse(localStorage.getItem('partyAllTimeStats') || '{}');
            if (!stats[winnerName]) stats[winnerName] = { beerpong: 0, x01: 0, ttt: 0 };
            stats[winnerName].beerpong = (stats[winnerName].beerpong || 0) + 1;
            localStorage.setItem('partyAllTimeStats', JSON.stringify(stats));

            if (isTournament) {
                localStorage.setItem('tournament_winner_name', winnerName);
                setTimeout(() => { window.location.href = 'tournament.html'; }, 2000);
            } else {
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            }
        }
    </script>
</body>
</html>
